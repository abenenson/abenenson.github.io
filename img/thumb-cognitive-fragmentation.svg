<svg xmlns="http://www.w3.org/2000/svg" width="720" height="540" viewBox="0 0 720 540">
  <rect width="720" height="540" fill="#1e1e24"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93b4d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff8c7a" stop-opacity="0.08"/>
